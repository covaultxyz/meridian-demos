    if(dl.product)tabList.push('Product');
    if(dl.action_items&&dl.action_items.length)tabList.push('Actions');
    if(dl.contradictions&&dl.contradictions.length)tabList.push('Risks');
    if(dl.opportunities&&dl.opportunities.length)tabList.push('Opportunities');
    if(dl.contacts&&dl.contacts.length)tabList.push('Contacts');
    if(dl.coherence)tabList.push('Coherence');
    tabs='<div class="tabs">'+tabList.map(function(t,ti){return'<div class="tab'+(ti===0?' active':'')+'" data-tab="'+t+'-'+idx+'" onclick="switchTab(this,\''+t+'-'+idx+'\')">'+t+'</div>'}).join('')+'</div>';
    // Profile panel
    if(dl.profile){
      var p=dl.profile,active=tabList[0]==='Profile'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Profile-'+idx+'"><table class="tbl">';
      for(var k in p)panels+='<tr><td style="color:var(--dim);width:140px;text-transform:capitalize">'+k.replace(/_/g,' ')+'</td><td>'+p[k]+'</td></tr>';
      panels+='</table></div>';
    }
    // Timeline panel
    if(dl.timeline){
      var active=tabList[0]==='Timeline'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Timeline-'+idx+'">'+dl.timeline.map(function(t){
        return'<div class="tl-item"><div class="tl-date">'+t.date+'</div><div class="tl-dot '+t.status+'"></div><div>'+t.text+'</div></div>';
      }).join('')+'</div>';
    }
    // Product panel
    if(dl.product){
      var pr=dl.product,active=tabList[0]==='Product'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Product-'+idx+'">';
      panels+='<div class="prod"><div style="font-weight:600;color:var(--ac);margin-bottom:.4rem;font-size:.9rem">'+pr.name+'</div>';
      panels+='<div class="row" style="margin-bottom:.5rem"><span class="tag">'+pr.files+' files</span><span class="tag">'+pr.lines.toLocaleString()+' lines</span><span class="tag">'+pr.tests+' tests</span>';
      if(pr.live_url)panels+='<span class="tag"><a href="'+pr.live_url+'" target="_blank" style="color:var(--gn);text-decoration:none">Live Demo \u2197</a></span>';
      if(pr.telegram)panels+='<span class="tag">'+pr.telegram+'</span>';
      panels+='</div></div>';
      if(pr.modules){
        panels+='<div style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Module Breakdown</div><table class="tbl"><thead><tr><th>Module</th><th>Lines</th><th>Purpose</th></tr></thead><tbody>';
        pr.modules.forEach(function(m){panels+='<tr><td style="color:var(--ac)">'+m.name+'</td><td>'+m.lines+'</td><td>'+m.purpose+'</td></tr>'});
        panels+='</tbody></table>';
      }
      if(dl.data_ingested){
        var di=dl.data_ingested;
        panels+='<div style="margin-top:.75rem;font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Data Ingested</div>';
        panels+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem">';
        panels+='<div class="sf" style="background:var(--s2);padding:.5rem;border-radius:4px;text-align:center"><div class="sk">Videos</div><div style="font-size:1.2rem;font-weight:700;color:var(--cy)">'+di.videos+'</div></div>';
        panels+='<div class="sf" style="background:var(--s2);padding:.5rem;border-radius:4px;text-align:center"><div class="sk">Words</div><div style="font-size:1.2rem;font-weight:700;color:var(--cy)">'+(di.words/1000).toFixed(0)+'K</div></div>';
        panels+='<div class="sf" style="background:var(--s2);padding:.5rem;border-radius:4px;text-align:center"><div class="sk">Hours</div><div style="font-size:1.2rem;font-weight:700;color:var(--cy)">'+di.hours+'</div></div>';
        panels+='</div>';
        if(di.categories){
          panels+='<div style="margin-top:.5rem;font-size:.72rem">';
          for(var cat in di.categories)panels+='<span style="margin-right:.75rem"><span style="color:var(--dim)">'+cat.replace(/_/g,' ')+':</span> '+di.categories[cat]+'</span>';
          panels+='</div>';
        }
      }
      if(dl.frameworks){
        panels+='<div style="margin-top:.75rem;font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Denver\'s Coaching Frameworks</div><div style="display:flex;flex-wrap:wrap;gap:.3rem">';
        dl.frameworks.forEach(function(f){panels+='<span class="tag">'+f+'</span>'});
        panels+='</div>';
      }
      panels+='</div>';
    }
    // Actions panel
    if(dl.action_items&&dl.action_items.length){
      var active=tabList[0]==='Actions'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Actions-'+idx+'"><table class="tbl"><thead><tr><th>#</th><th>Action</th><th>Owner</th><th>Priority</th><th>Status</th></tr></thead><tbody>';
      dl.action_items.forEach(function(a,ai){
        var pc=a.priority==='high'?'var(--rd)':a.priority==='medium'?'var(--yl)':'var(--dim)';
        panels+='<tr><td>'+(ai+1)+'</td><td>'+a.text+'</td><td>'+a.owner+'</td><td style="color:'+pc+'">'+a.priority+'</td><td><span class="b b-'+(a.status==='todo'?'lead':a.status==='done'?'completed':'d')+'">'+a.status+'</span></td></tr>';
      });
      panels+='</tbody></table></div>';
    }
    // Risks/contradictions panel
    if(dl.contradictions&&dl.contradictions.length){
      var active=tabList[0]==='Risks'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Risks-'+idx+'">';
      if(dl.risk)panels+='<div class="risk"><strong>Active Risk:</strong> '+dl.risk+'</div>';
      dl.contradictions.forEach(function(c){panels+='<div class="warn"><strong>'+c.label+':</strong> '+c.text+'</div>'});
      panels+='</div>';
    }
    // Opportunities panel
    if(dl.opportunities&&dl.opportunities.length){
      var active=tabList[0]==='Opportunities'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Opportunities-'+idx+'"><table class="tbl"><thead><tr><th>Opportunity</th><th>Type</th><th>Status</th><th>Detail</th></tr></thead><tbody>';
      dl.opportunities.forEach(function(o){panels+='<tr><td style="font-weight:600">'+o.name+'</td><td>'+o.type+'</td><td><span class="b b-'+(o.status.toLowerCase().indexOf('complete')>=0||o.status.toLowerCase().indexOf('built')>=0?'completed':o.status.toLowerCase().indexOf('depend')>=0?'qualified':'lead')+'">'+o.status+'</span></td><td style="font-size:.72rem;color:var(--dim)">'+o.detail+'</td></tr>'});
      panels+='</tbody></table></div>';
    }
    // Contacts panel
    if(dl.contacts&&dl.contacts.length){
      var active=tabList[0]==='Contacts'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Contacts-'+idx+'">';
      dl.contacts.forEach(function(c){panels+='<div class="contact"><div><div class="c-name">'+c.name+'</div><div class="c-role">'+c.role+'</div></div><div style="margin-left:auto"><span class="b b-'+(c.status==='Client'||c.status==='Core team'?'engaged':'lead')+'">'+c.status+'</span></div></div>'});
      panels+='</div>';
    }
    // Coherence panel
    if(dl.coherence){
      var co=dl.coherence,active=tabList[0]==='Coherence'?' active':'';
      panels+='<div class="tab-content'+active+'" id="tc-Coherence-'+idx+'">';
      panels+='<div style="font-size:.7rem;color:var(--dim);margin-bottom:.75rem">Coherence audit from Sensei/Delphi megaaudit (40 claims, 8 artifacts)</div>';
      var meters=[['Internal Consistency',co.internal],['Evidence Grounding',co.evidence],['Completeness',co.completeness],['Sequencing',co.sequencing]];
      meters.forEach(function(m){
        var pct=Math.round(m[1]*100),clr=pct>=70?'var(--gn)':pct>=50?'var(--yl)':'var(--rd)';
        panels+='<div class="meter"><div class="meter-label">'+m[0]+'</div><div class="meter-bar"><div class="meter-fill" style="width:'+pct+'%;background:'+clr+'"></div></div><div class="meter-val" style="color:'+clr+'">'+pct+'%</div></div>';
      });
      panels+='<div style="margin-top:.75rem;padding:.5rem;background:var(--s2);border-radius:6px;text-align:center"><div style="font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Overall Coherence</div><div style="font-size:1.5rem;font-weight:700;color:'+(co.overall>=0.7?'var(--gn)':co.overall>=0.5?'var(--yl)':'var(--rd)')+'">'+(co.overall*100).toFixed(1)+'%</div></div>';
      panels+='</div>';
    }
    return '<div class="deal" id="deal-'+idx+'"><div class="deal-top" onclick="toggleDeal('+idx+')"><div class="row"><div class="deal-name">'+dl.client+'</div><div><span class="b '+gc(dl.grade)+'">'+dl.grade+'</span> <span class="b '+sc(stg)+'">'+stg+'</span></div></div><div style="font-size:.75rem;color:var(--dim)">'+dl.title+'</div>'+summ+'<div class="expand-hint">\u25BC Click to expand details</div></div><div class="detail"><div class="detail-inner">'+tabs+panels+'</div></div><div class="deal-footer"><a href="'+dl.url+'" target="_blank">#'+dl.number+'</a><span style="color:var(--dim)">Created '+fd(dl.created)+'</span></div></div>';
  }).join('');
}
function renderTable(d){
  document.getElementById('table-body').innerHTML=d.deals.map(function(dl){
    return'<tr><td><strong>'+dl.client+'</strong></td><td><span class="b '+sc(dl.stage)+'">'+dl.stage+'</span></td><td style="color:'+(dl.revenue?'var(--gn)':'var(--dim)')+'">'+(dl.revenue||'\u2014')+'</td><td style="max-width:200px">'+(dl.next_action||'\u2014')+'</td><td style="color:'+dc(dl.deadline)+'">'+fd(dl.deadline)+'</td><td>'+(dl.owner||'\u2014')+'</td><td style="color:'+(dl.risk?'var(--rd)':'var(--dim)')+'">'+(dl.risk||'\u2014')+'</td></tr>';
  }).join('');
}
function toggleDeal(idx){var el=document.getElementById('deal-'+idx);el.classList.toggle('open')}
function switchTab(tabEl,id){
  var tabs=tabEl.parentNode.children;for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  tabEl.classList.add('active');
  var panels=tabEl.parentNode.parentNode.querySelectorAll('.tab-content');
  panels.forEach(function(p){p.classList.remove('active')});
  document.getElementById('tc-'+id).classList.add('active');
}
document.getElementById('updated').textContent='Updated '+fd(DATA.project.updated);
document.getElementById('status-badge').textContent=DATA.deals.length+' DEALS';
renderKPIs(DATA);renderFunnel(DATA);renderDeals(DATA);renderTable(DATA);
document.getElementById('footer').textContent='MERIDIAN \u00b7 Client Pipeline \u00b7 Project #13 \u00b7 '+DATA.deals.length+' deals \u00b7 Last updated '+fd(DATA.project.updated);
</script>
</body>
</html>
