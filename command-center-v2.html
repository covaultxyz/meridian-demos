    ) : null,

    // CI trend - large KPI
    passRatePct != null ? React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-3' },
      React.createElement(GlassCard, { className: 'p-6 text-center md:col-span-1' },
        React.createElement('div', { className: 'text-[10px] uppercase tracking-widest text-[#8899aa] mb-1' }, 'Build Pass Rate (7 Day)'),
        React.createElement('div', { className: 'text-4xl font-bold', style: { color: passRateColor } }, passRatePct + '%'),
        React.createElement('div', { className: 'text-[10px] text-[#8899aa] mt-1' },
          ci.last_run_status ? 'Last run: ' + ci.last_run_status : ''
        )
      ),
      // Issue age distribution
      issues.length > 0 ? React.createElement(GlassCard, { className: 'p-4 md:col-span-2' },
        React.createElement('h3', { className: 'text-xs font-bold text-[#8899aa] uppercase tracking-widest mb-3' }, 'Issue Age Distribution'),
        (function() {
          var maxBucket = Math.max(ageBuckets.today, ageBuckets.this_week, ageBuckets.this_month, ageBuckets.older, 1);
          return React.createElement('div', { className: 'space-y-1' },
            React.createElement(MetricBar, { label: 'Today', pct: ageBuckets.today / maxBucket * 100, display: String(ageBuckets.today), color: '#22c55e' }),
            React.createElement(MetricBar, { label: 'This Week', pct: ageBuckets.this_week / maxBucket * 100, display: String(ageBuckets.this_week), color: '#38bdf8' }),
            React.createElement(MetricBar, { label: 'This Month', pct: ageBuckets.this_month / maxBucket * 100, display: String(ageBuckets.this_month), color: '#eab308' }),
            React.createElement(MetricBar, { label: 'Older', pct: ageBuckets.older / maxBucket * 100, display: String(ageBuckets.older), color: '#ef4444' })
          );
        })()
      ) : null
    ) : null,

    // Stale issues alert
    staleCount > 5 ? React.createElement(GlassCard, { className: 'p-4 border-l-4 border-l-[#f97316]' },
      React.createElement('div', { className: 'flex items-center gap-2' },
        React.createElement('span', { className: 'text-[#f97316] text-lg' }, '\u26A0'),
        React.createElement('div', null,
          React.createElement('span', { className: 'text-sm font-semibold text-[#f97316]' }, staleCount + ' Stale Issues'),
          React.createElement('p', { className: 'text-[10px] text-[#8899aa]' }, 'Issues older than 14 days may need attention or closure')
        )
      )
    ) : null,

    // Daemon scorecards
    daemonList.length > 0 ? React.createElement(GlassCard, { className: 'p-4' },
      React.createElement('h3', { className: 'text-xs font-bold text-[#8899aa] uppercase tracking-widest mb-3' }, 'Program Health'),
      React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3' },
        daemonList.map(function(d, i) {
          var score = d.score != null ? d.score : null;
          var isOnline = d.status === 'online' || d.status === 'active';
          var healthColor = score != null ? (score >= 80 ? '#22c55e' : (score >= 50 ? '#eab308' : '#ef4444')) : (isOnline ? '#22c55e' : '#6b7280');
          return React.createElement('div', {
            key: i,
            className: 'bg-[#1a2234] rounded-lg p-3 text-center'
          },
            React.createElement('div', { className: 'text-sm font-bold capitalize mb-1', style: { color: healthColor } }, d.name),
            score != null
              ? React.createElement('div', { className: 'text-2xl font-bold', style: { color: healthColor } }, score)
              : React.createElement('div', { className: 'text-xs capitalize', style: { color: healthColor } }, d.status || 'unknown'),
            d.current_assignment
              ? React.createElement('div', { className: 'text-[10px] text-[#8899aa] mt-1 truncate' }, d.current_assignment)
              : (d.host ? React.createElement('div', { className: 'text-[10px] text-[#8899aa] mt-1' }, d.host) : null)
          );
        })
      )
    ) : null
  );
};

/* ================================================================
   MAIN APP
   ================================================================ */
var App = function() {
  var _auth = useState(checkAuthSync());
  var authed = _auth[0]; var setAuthed = _auth[1];

  var _tab = useState(window.location.hash.replace('#', '') || 'dashboard');
  var activeTab = _tab[0]; var setActiveTab = _tab[1];

  var _data = useState(null);
  var data = _data[0]; var setData = _data[1];

  var _source = useState('unavailable');
  var dataSource = _source[0]; var setDataSource = _source[1];

  var _loading = useState(true);
  var loading = _loading[0]; var setLoading = _loading[1];

  var _lastUpdated = useState(null);
  var lastUpdated = _lastUpdated[0]; var setLastUpdated = _lastUpdated[1];

  var _refreshing = useState(false);
  var refreshing = _refreshing[0]; var setRefreshing = _refreshing[1];

  var refreshTimerRef = useRef(null);

  var TABS = [
    { id: 'dashboard', label: 'DASHBOARD' },
    { id: 'pipeline', label: 'PIPELINE' },
    { id: 'operations', label: 'OPERATIONS' },
    { id: 'development', label: 'DEVELOPMENT' },
    { id: 'sales', label: 'SALES' },
    { id: 'intelligence', label: CONFIG.mode === 'customer' ? 'KNOWLEDGE' : 'INTELLIGENCE' },
    { id: 'calls', label: 'CALLS' },
    { id: 'tasks', label: 'TASKS' },
    { id: 'insights', label: 'INSIGHTS' }
  ];

  // Hide development + insights in customer mode
  var visibleTabs = CONFIG.mode === 'customer'
    ? TABS.filter(function(t) { return t.id !== 'development' && t.id !== 'insights'; })
    : TABS;

  // Load data
  var loadData = useCallback(function() {
    setLoading(true);
    // Try loading static data first
    fetch('dashboard-data.json?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(d) {
        window.STATIC_DATA = d;
        setLastUpdated(d.generated_at);

        // Now try gateway
        if (CONFIG.gateway) {
          return fetch(CONFIG.gateway + '/api/humantask/mesh-stats', {
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('mrd_gateway_token') || '') },
            signal: AbortSignal.timeout(5000)
          }).then(function(resp) {
            if (resp.ok) return resp.json().then(function(live) {
              // Merge live data with static sections
              var merged = Object.assign({}, d.sections, { _live: live });
              setData(merged);
              setDataSource('live');
              setLoading(false);
            });
            throw new Error('Gateway error');
          }).catch(function() {
            setData(d.sections);
            setDataSource('static');
            setLoading(false);
          });
        } else {
          setData(d.sections);
          setDataSource(CONFIG.mode === 'public' ? 'static' : 'static');
          setLoading(false);
        }
      })
      .catch(function() {
        window.STATIC_DATA = null;
        setData(null);
        setDataSource('unavailable');
        setLoading(false);
      });
  }, []);

  // Manual refresh
  var doRefresh = function() {
    setRefreshing(true);
    loadData();
    setTimeout(function() { setRefreshing(false); }, 1000);
  };

  // Initial load
  useEffect(function() {
    if (authed) loadData();
  }, [authed, loadData]);

  // Auto-refresh timer
  useEffect(function() {
    if (!authed) return;
    var interval = dataSource === 'live' ? 60000 : 300000; // 1m live, 5m static
    refreshTimerRef.current = setInterval(function() { loadData(); }, interval);
    return function() { clearInterval(refreshTimerRef.current); };
  }, [authed, dataSource, loadData]);

  // Hash routing
  useEffect(function() {
    function onHash() {
      var h = window.location.hash.replace('#', '');
      if (h && visibleTabs.some(function(t) { return t.id === h; })) {
        setActiveTab(h);
      }
    }
    window.addEventListener('hashchange', onHash);
    return function() { window.removeEventListener('hashchange', onHash); };
  }, [visibleTabs]);

  function switchTab(id) {
    setActiveTab(id);
    window.location.hash = id;
  }

  // Auth gate
  if (!authed) {
    return React.createElement(AuthGate, { onAuth: function() { setAuthed(true); } });
  }

  // Loading state
  if (loading && !data) {
    return React.createElement('div', { className: 'min-h-screen flex items-center justify-center' },
      React.createElement('div', { className: 'text-center' },
        React.createElement('div', {
          className: 'w-8 h-8 border-2 border-[#1e2d4a] border-t-[#38bdf8] rounded-full mx-auto mb-3',
          style: { animation: 'spin 0.8s linear infinite' }
        }),
        React.createElement('p', { className: 'text-[#8899aa] text-sm' }, 'Loading dashboard data...')
      )
    );
  }

  // Display name
  var displayName = CONFIG.mode === 'customer' ? CONFIG.name : 'MERIDIAN';

  // Render active view
  function renderView() {
    switch (activeTab) {
      case 'dashboard': return React.createElement(DashboardView, { data: data, source: dataSource });
      case 'pipeline': return React.createElement(PipelineView, { data: data, source: dataSource });
      case 'operations': return React.createElement(OperationsView, { data: data, source: dataSource });
      case 'development': return React.createElement(DevelopmentView, { data: data, source: dataSource });
      case 'sales': return React.createElement(SalesView, { data: data, source: dataSource });
      case 'intelligence': return React.createElement(IntelligenceView, { data: data, source: dataSource });
      case 'calls': return React.createElement(CallsView, { data: data, source: dataSource });
      case 'tasks': return React.createElement(TasksView, { data: data, source: dataSource });
      case 'insights': return React.createElement(InsightsView, { data: data, source: dataSource });
      default: return React.createElement(DashboardView, { data: data, source: dataSource });
    }
  }

  return React.createElement('div', { className: 'min-h-screen mesh-grid' },
    // Header
    React.createElement('header', { className: 'border-b border-[#1e2d4a] bg-gradient-to-r from-[#0f172a] to-[#1e293b]' },
      React.createElement('div', { className: 'max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2' },
        React.createElement('div', null,
          React.createElement('h1', { className: 'text-[#38bdf8] font-bold text-lg tracking-wide' },
            displayName,
            React.createElement('span', { className: 'text-[#8899aa] font-normal text-sm ml-2' }, '-- Command Center')
          ),
          React.createElement('div', { className: 'text-[10px] text-[#8899aa]' },
            lastUpdated ? 'Generated ' + relativeTime(lastUpdated) : ''
          )
        ),
        React.createElement('div', { className: 'flex items-center gap-3' },
          React.createElement(SourceBadge, { source: dataSource }),
          React.createElement('span', { className: 'text-[10px] bg-sky-500/10 text-[#38bdf8] px-2 py-0.5 rounded-full border border-sky-500/20 font-semibold' }, 'v2.0'),
          React.createElement('button', {
            onClick: doRefresh,
            className: 'text-xs text-[#8899aa] border border-[#1e2d4a] rounded px-2.5 py-1 hover:text-[#38bdf8] hover:border-[#38bdf8] transition-all ' + (refreshing ? 'animate-pulse' : ''),
          }, refreshing ? 'Refreshing...' : 'Refresh')
        )
      )
    ),

    // Tab bar
    React.createElement('nav', { className: 'bg-[#111827] border-b border-[#1e2d4a] overflow-x-auto' },
      React.createElement('div', { className: 'max-w-7xl mx-auto px-4 flex' },
        visibleTabs.map(function(tab) {
          var isActive = activeTab === tab.id;
          return React.createElement('button', {
            key: tab.id,
            onClick: function() { switchTab(tab.id); },
            className: 'px-4 py-3 text-xs font-semibold uppercase tracking-widest whitespace-nowrap transition-all border-b-2 '
              + (isActive
                ? 'text-[#38bdf8] border-[#38bdf8]'
                : 'text-[#8899aa] border-transparent hover:text-[#e2e8f0]')
          }, tab.label);
        })
      )
    ),

    // Content
    React.createElement('main', { className: 'max-w-7xl mx-auto px-4 py-6' },
      data
        ? renderView()
        : React.createElement('div', { className: 'text-center py-12' },
          React.createElement('div', { className: 'bg-red-500/5 border border-red-500/20 rounded-xl p-6 max-w-md mx-auto' },
            React.createElement('p', { className: 'text-[#ef4444] font-semibold mb-1' }, 'Data Unavailable'),
            React.createElement('p', { className: 'text-xs text-[#8899aa]' }, 'Check that dashboard-data.json exists. Run: python scripts/generate-unified-dashboard.py')
          )
        )
    ),

    // Footer
    React.createElement('footer', { className: 'border-t border-[#1e2d4a] text-center py-4 text-[10px] text-[#8899aa] mt-8' },
      displayName + ' Command Center v2.0',
      lastUpdated ? ' | Generated ' + new Date(lastUpdated).toLocaleString() : ''
    )
  );
};

/* ================================================================
   MOUNT
   ================================================================ */
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
