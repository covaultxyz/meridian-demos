          React.createElement('div', { className: 'bg-red-500/5 border border-red-500/20 rounded-xl p-6 max-w-md mx-auto' },
            React.createElement('p', { className: 'text-[#ef4444] font-semibold mb-1' }, 'Data Unavailable'),
            React.createElement('p', { className: 'text-xs text-[#8899aa]' }, 'Check that ' + CLIENT_DATA_FILE + ' exists. Run: python scripts/generate-unified-dashboard.py')
          )
        )
    ),

    // Footer
    React.createElement('footer', { className: 'border-t border-[#1e2d4a] text-center py-4 text-[10px] text-[#8899aa] mt-8' },
      displayName + ' Command Center v2.0',
      lastUpdated ? ' | Generated ' + new Date(lastUpdated).toLocaleString() : ''
    )
  );
};

/* MOUNT */
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
